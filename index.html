<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Birthday Website</title>

<style>

html,body{
margin:0;
padding:0;
width:100%;
height:100%;
background:black;
overflow:hidden;
font-family:Arial;
}

/* Section Style */

section{
width:100vw;
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
background:black;
color:white;
position:relative;
}

/* Button */

button{
padding:12px 30px;
border:none;
border-radius:30px;
background:#ff2ea6;
color:white;
font-size:18px;
cursor:pointer;
box-shadow:0 0 15px #ff2ea6;
}

/* Next Button Bottom Center */

.next{
position:fixed;
bottom:40px;
left:50%;
transform:translateX(-50%);
z-index:20;
}

/* Video */

video{
width:90%;
max-width:500px;
border-radius:15px;
}

/* Animation Canvas */

canvas{
display:block;
}

/* Photo Gallery */

.gallery{
position:relative;
width:220px;
height:220px;
transform-style:preserve-3d;
animation:rotate 18s linear infinite;
}

.gallery img{
position:absolute;
width:160px;
height:160px;
object-fit:cover;
border-radius:15px;
left:30px;
top:30px;
}

/* Rotation Animation */

@keyframes rotate{
from{transform:rotateY(0deg);}
to{transform:rotateY(360deg);}
}

h1{
font-size:40px;
}

h2{
font-size:32px;
}

</style>

</head>

<body>

<!-- SECTION 1 -->
<section id="sec1">
<h1>Hey Wait 💖</h1>
<button onclick="showSection(2)">Next</button>
</section>


<!-- SECTION 2 VIDEO -->
<section id="sec2" style="display:none">

<video id="video" src="video.mp4"></video>

</section>


<!-- SECTION 3 ANIMATION -->
<section id="sec3" style="display:none">

<canvas id="canvas"></canvas>

<button class="next" onclick="showSection(4)">Next ➜</button>

</section>


<!-- SECTION 4 WISHES -->
<section id="sec4" style="display:none">

<h2>Best Wishes 💖</h2>

<p style="padding:20px;text-align:center">
You are my favorite person ❤️<br>
My partner in crime 😎<br>
My best memory maker ✨<br><br>
Happy Birthday 🎂
</p>

<button onclick="showSection(5)">Next ➜</button>

</section>


<!-- SECTION 5 PHOTOS -->
<section id="sec5" style="display:none">

<h2>Happiest Birthday 🎉</h2>

<audio id="song" src="song.mp3"></audio>

<div class="gallery">

<img src="p1.jpg">
<img src="p2.jpg">
<img src="p3.jpg">
<img src="p4.jpg">
<img src="p5.jpg">
<img src="p6.jpg">
<img src="p7.jpg">
<img src="p8.jpg">

</div>

<button onclick="showSection(6)">Next ➜</button>

</section>


<!-- SECTION 6 FINAL -->
<section id="sec6" style="display:none">

<h1>HAPPY BIRTHDAY</h1>
<h2>ONCE AGAIN</h2>
<h1>MY CRIME PARTNER ❤️</h1>

</section>


<script>

/* Section Control */

function showSection(n){

document.querySelectorAll("section").forEach(s=>{
s.style.display="none"
})

document.getElementById("sec"+n).style.display="flex"


/* Video control */

let video=document.getElementById("video")

if(n==2){
video.play()

video.onended=function(){
showSection(3)
startAnimation()
}
}


/* Song control */

let song=document.getElementById("song")

if(n==5){
song.play()
}else{
song.pause()
song.currentTime=0
}

}


/* Particle Animation */

let canvas=document.getElementById("canvas")
let ctx=canvas.getContext("2d")

canvas.width=window.innerWidth
canvas.height=window.innerHeight*0.6

let dots=[]

for(let i=0;i<1500;i++){
dots.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
vy:Math.random()*2+1
})
}

function drawDots(){

ctx.fillStyle="rgba(0,0,0,0.2)"
ctx.fillRect(0,0,canvas.width,canvas.height)

ctx.fillStyle="#ff4da6"

dots.forEach(d=>{

ctx.beginPath()
ctx.arc(d.x,d.y,2,0,Math.PI*2)
ctx.fill()

d.y+=d.vy
if(d.y>canvas.height) d.y=0

})

requestAnimationFrame(drawDots)

}

function startAnimation(){
drawDots()
}

</script>

</body>
</html>
