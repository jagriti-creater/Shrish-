<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Birthday Surprise</title>

<style>

body{
margin:0;
font-family:sans-serif;
background:black;
color:white;
text-align:center;
overflow:hidden;
}

section{
width:100vw;
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
}

button{
padding:12px 30px;
font-size:18px;
border:none;
border-radius:30px;
background:#ff2ea6;
color:white;
cursor:pointer;
margin-top:30px;
}

video{
width:90%;
max-width:500px;
border-radius:10px;
}

canvas{
width:100%;
height:60vh;
}

.gallery{
position:relative;
width:250px;
height:250px;
transform-style:preserve-3d;
animation:rotate 18s linear infinite;
}

.gallery img{
position:absolute;
width:160px;
height:160px;
object-fit:cover;
border-radius:15px;
left:45px;
top:45px;
}

@keyframes rotate{
from{transform:rotateY(0deg);}
to{transform:rotateY(360deg);}
}

h1{
font-size:40px;
}

h2{
font-size:32px;
}

</style>
</head>

<body>

<!-- SECTION 1 -->
<section id="sec1">
<h1>Hey Waittt 💖</h1>
<button onclick="showSection(2)">Next</button>
</section>


<!-- SECTION 2 VIDEO -->
<section id="sec2" style="display:none">
<video id="vid" src="video.mp4"></video>
</section>


<!-- SECTION 3 ANIMATION -->
<section id="sec3" style="display:none">

<canvas id="canvas"></canvas>

<button onclick="showSection(4)">Next</button>

</section>


<!-- SECTION 4 WISHES -->
<section id="sec4" style="display:none">

<h1>Best Wishes 💖</h1>

<p>
May your day be filled with happiness, laughter and lots of love.  
You deserve all the best moments in life.
</p>

<button onclick="showSection(5)">Next</button>

</section>


<!-- SECTION 5 PHOTOS -->
<section id="sec5" style="display:none">

<h2>Happiest Birthday 🎉</h2>

<div class="gallery">

<img src="p1.jpg" style="transform:rotateY(0deg) translateZ(250px)">
<img src="p2.jpg" style="transform:rotateY(45deg) translateZ(250px)">
<img src="p3.jpg" style="transform:rotateY(90deg) translateZ(250px)">
<img src="p4.jpg" style="transform:rotateY(135deg) translateZ(250px)">
<img src="p5.jpg" style="transform:rotateY(180deg) translateZ(250px)">
<img src="p6.jpg" style="transform:rotateY(225deg) translateZ(250px)">
<img src="p7.jpg" style="transform:rotateY(270deg) translateZ(250px)">
<img src="p8.jpg" style="transform:rotateY(315deg) translateZ(250px)">

</div>

<button onclick="showSection(6)">Next</button>

</section>


<!-- SECTION 6 FINAL -->
<section id="sec6" style="display:none">

<h1>HAPPY BIRTHDAY</h1>
<h2>ONCE AGAIN</h2>
<h1>MY CRIME PARTNER 💖</h1>

</section>



<audio id="song" src="song.mp3"></audio>


<script>

function showSection(n){

document.querySelectorAll("section").forEach(s=>s.style.display="none")

document.getElementById("sec"+n).style.display="flex"

if(n==2){
let v=document.getElementById("vid")
v.play()
v.onended=function(){
showSection(3)
startAnimation()
}
}

if(n==5){
document.getElementById("song").play()
}else{
document.getElementById("song").pause()
}

}


let canvas=document.getElementById("canvas")
let ctx=canvas.getContext("2d")

canvas.width=window.innerWidth
canvas.height=window.innerHeight*0.6

let dots=[]

for(let i=0;i<1500;i++){
dots.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
vy:Math.random()*2+1
})
}

function drawDots(){

ctx.fillStyle="rgba(0,0,0,0.2)"
ctx.fillRect(0,0,canvas.width,canvas.height)

ctx.fillStyle="#ff4fcf"

dots.forEach(d=>{
ctx.beginPath()
ctx.arc(d.x,d.y,2,0,Math.PI*2)
ctx.fill()

d.y+=d.vy
if(d.y>canvas.height) d.y=0
})

requestAnimationFrame(drawDots)

}

function startAnimation(){
drawDots()
}

</script>

</body>
</html>
